<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Raganim — What do you want to watch?</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="hero-bg"></div>

<div class="page">

  <!-- ── Header ── -->
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </div>
    <span class="logo-text">Raganim</span>
    <div class="header-dot"></div>
    <div class="health-badge">
      <div class="health-dot" id="healthDot"></div>
      <span id="healthLabel">connecting…</span>
    </div>
  </header>

  <!-- ── Hero ── -->
  <div class="hero">
    <p class="hero-eyebrow">25,282 anime · semantic search</p>
    <h1 class="hero-title">What do you want<br>to <span>watch?</span></h1>
    <p class="hero-sub">Describe a mood, theme, or story — the engine finds what matches.</p>

    <!-- Search bar -->
    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="e.g. a lone samurai seeking redemption…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-btn" id="searchBtn" onclick="doSearch()">
          <div class="spinner" id="spinner"></div>
          <svg id="btnIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          <span id="btnLabel">Search</span>
        </button>
      </div>

      <!-- Suggestion chips -->
      <div class="suggestions">
        <div class="chip" onclick="setQuery('mecha robots war future')">mecha war</div>
        <div class="chip" onclick="setQuery('slice of life school romance')">school romance</div>
        <div class="chip" onclick="setQuery('dark fantasy magic power')">dark fantasy</div>
        <div class="chip" onclick="setQuery('sports competition friendship')">sports</div>
        <div class="chip" onclick="setQuery('mystery detective psychological')">mystery</div>
        <div class="chip" onclick="setQuery('adventure isekai fantasy world')">isekai</div>
      </div>

      <!-- Status bar -->
      <div class="status-bar" id="statusBar"></div>
    </div>
  </div>

  <!-- ── Results section ── -->
  <div class="divider" id="divider">
    <div class="divider-line"></div>
    <span class="divider-label" id="dividerLabel">Results</span>
    <div class="divider-line"></div>
  </div>

  <div class="results" id="results"></div>

</div><!-- /page -->

<!-- Back to top -->
<div class="back-to-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</div>

<footer></footer>

<script src="script.js"></script>
</body>
</html>
